<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dual Knob Drawing Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../styles/style.css" />
  </head>
  <body>
    <main class="app">
      <header class="toolbar">
        <h1>Dual Knob Drawing</h1>
        <div class="control-deck">
          <div class="status-wrap">
            <span id="penStatus" class="status hidden-ui">Mode: MOVE</span>
            <span id="toolStatus" class="status hidden-ui">Tool: Move</span>
            <span id="colorStatus" class="status hidden-ui">Color: #111111</span>
            <span id="sizeStatus" class="status hidden-ui">Canvas: -</span>
            <button id="resizeBtn" class="size-btn" type="button">크기 변경</button>
            <button id="clearBtn" class="size-btn" type="button">초기화</button>
          </div>
        </div>
      </header>

      <section id="palettePanel" class="palette palette-popup hidden" aria-label="색상 팔레트"></section>

      <div class="workspace">
        <aside class="artist-panel">
          <div id="modeIcon" class="mode-icon mode-move" aria-label="mode icon"></div>
          <div id="miniPalette" class="mini-palette" aria-hidden="true">
            <div id="activePaintBlob" class="paint-blob"></div>
          </div>
          <img class="guide-card" src="../assets/guide-full.png" alt="조작 가이드" />
        </aside>

        <div id="canvasWrap" class="canvas-wrap">
          <canvas id="drawCanvas" width="960" height="640"></canvas>
        </div>
      </div>
    </main>

    <div id="sizePicker" class="overlay">
      <div class="dialog">
        <h2>캔버스 크기 선택</h2>
        <p>그리드 크기를 선택하면 바로 시작됩니다.</p>
        <div class="size-options">
          <button class="size-btn" data-size="10">10 × 10</button>
          <button class="size-btn" data-size="15">15 × 15</button>
          <button class="size-btn" data-size="30">30 × 30</button>
          <button class="size-btn" data-size="50">50 × 50</button>
          <button class="size-btn" data-size="100">100 × 100</button>
        </div>
      </div>
    </div>

    <script src="../scripts/knob.js"></script>
  </body>
</html>
