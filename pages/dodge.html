<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dual Knob Dodge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../styles/style.css" />
    <link rel="stylesheet" href="../styles/maze.css" />
    <link rel="stylesheet" href="../styles/dodge.css" />
  </head>
  <body class="maze-body">
    <div class="maze-app">
      <header class="maze-toolbar">
        <div class="maze-toolbar-left">
          <a class="size-btn home-btn" href="./index.html">← 홈</a>
          <span class="maze-app-title">Knob Dodge</span>
        </div>
        <div class="maze-timers">
          <div class="maze-timer-group">
            <span class="maze-timer-label">남은시간</span>
            <div id="dodgeTimeBoard" class="maze-timer-board">00:00.0</div>
          </div>
          <div class="maze-timer-group">
            <span class="maze-timer-label">점수</span>
            <div id="dodgeScoreBoard" class="maze-timer-board dodge-score-board">0</div>
          </div>
        </div>
        <div class="maze-toolbar-right">
          <button id="dodgeStartBtn" class="size-btn" type="button">시작</button>
          <button id="dodgeResetBtn" class="size-btn" type="button">다시 시작</button>
        </div>
      </header>
      <section class="maze-workspace">
        <aside class="maze-panel">
          <div class="maze-panel-section">
            <p class="maze-panel-label">조작법</p>
            <p class="maze-guide-line"><strong>좌 노브</strong> 상하 이동</p>
            <p class="maze-guide-line"><strong>우 노브</strong> 좌우 이동</p>
            <p class="maze-guide-line"><strong>우 클릭</strong> 실드 (짧은 무적)</p>
            <p class="maze-guide-line"><strong>중클릭</strong> 일시정지</p>
          </div>
          <div class="maze-panel-section">
            <p class="maze-panel-label">상태</p>
            <div class="maze-status-list">
              <span id="dodgeDifficultyState" class="status">Difficulty: -</span>
              <span id="dodgeDodgedState" class="status">Dodged: 0</span>
              <span id="dodgeShieldState" class="status">Shield: READY</span>
              <span id="dodgeBestState" class="status">Best: -</span>
            </div>
          </div>
          <div class="maze-panel-section">
            <p class="maze-panel-label">감도</p>
            <div class="maze-sens-row">
              <button id="dodgeSensDecBtn" class="size-btn" type="button">−</button>
              <span id="dodgeSensState" class="status">2px/틱</span>
              <button id="dodgeSensIncBtn" class="size-btn" type="button">+</button>
            </div>
          </div>
          <p id="dodgeMessage" class="maze-message">난이도를 선택하고 시작하세요.</p>
        </aside>
        <div class="maze-canvas-wrap dodge-canvas-wrap">
          <canvas id="dodgeCanvas" width="580" height="580"></canvas>
        </div>
      </section>
    </div>
    <div id="dodgeStartOverlay" class="overlay">
      <div class="dialog">
        <h2>Knob Dodge</h2>
        <p>듀얼 노브로 플레이어를 움직여 낙하 장애물을 피하세요.<br />제한 시간 안에 살아남으면 클리어!</p>
        <div class="size-options">
          <button class="size-btn difficulty-btn" data-difficulty="easy" type="button">초급</button>
          <button class="size-btn difficulty-btn" data-difficulty="normal" type="button">중급</button>
          <button class="size-btn difficulty-btn" data-difficulty="hard" type="button">고급</button>
        </div>
        <button id="dodgeStartControlBtn" class="maze-big-start-btn" type="button">시작</button>
      </div>
    </div>
    <div id="dodgeResultOverlay" class="overlay hidden">
      <div class="dialog">
        <h2 id="dodgeResultTitle">RESULT</h2>
        <p id="dodgeResultText">결과를 확인하세요.</p>
        <button id="dodgeReplayBtn" class="size-btn" type="button">다시 도전</button>
      </div>
    </div>
    <script src="../scripts/dodge.js"></script>
  </body>
</html>
