<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dual Knob Maze Escape</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../styles/style.css" />
    <link rel="stylesheet" href="../styles/maze.css" />
  </head>
  <body class="maze-body">
    <div class="maze-app">

      <!-- ── 툴바 ── -->
      <header class="maze-toolbar">
        <div class="maze-toolbar-left">
          <a class="size-btn home-btn" href="./index.html">← 홈</a>
          <span class="maze-app-title">Maze Escape</span>
        </div>
        <div class="maze-timers">
          <div class="maze-timer-group">
            <span class="maze-timer-label">제한시간</span>
            <div id="mazeLimitBoard" class="maze-timer-board">00:00.0</div>
          </div>
          <div class="maze-timer-group">
            <span class="maze-timer-label">내기록</span>
            <div id="mazeRecordBoard" class="maze-timer-board">00:00.0</div>
          </div>
        </div>
        <div class="maze-toolbar-right">
          <button id="mazeStartBtn" class="size-btn" type="button">시작</button>
          <button id="mazeResetBtn" class="size-btn" type="button">다시 시작</button>
        </div>
      </header>

      <!-- ── 워크스페이스 ── -->
      <section class="maze-workspace">

        <!-- 사이드패널 -->
        <aside class="maze-panel">
          <div class="maze-panel-section">
            <p class="maze-panel-label">노브 매핑</p>
            <p class="maze-guide-line"><strong>우클릭(노브버튼)</strong> 부스트 ON/OFF</p>
            <p class="maze-guide-line"><strong>노브 회전</strong> 공 이동</p>
          </div>

          <div class="maze-panel-section">
            <p class="maze-panel-label">상태</p>
            <div class="maze-status-list">
              <span id="mazeDifficultyState" class="status">Difficulty: -</span>
              <span id="mazeStageState" class="status">Stage: 0</span>
              <span id="mazeTimerState" class="status">Time: 00.0</span>
              <span id="mazeScoreState" class="status">Total Time: -</span>
              <span id="mazeBestRecordState" class="status">Best: -</span>
              <span id="leftToggleState" class="status">Left: OFF</span>
              <span id="rightToggleState" class="status">Right: OFF</span>
              <span id="mazeLevelState" class="status">Level: 15×15</span>
            </div>
          </div>

          <div class="maze-panel-section">
            <p class="maze-panel-label">감도</p>
            <div class="maze-sens-row">
              <button id="mazeSensDecBtn" class="size-btn" type="button">−</button>
              <span id="mazeSensState" class="status">2px/칸</span>
              <button id="mazeSensIncBtn" class="size-btn" type="button">+</button>
            </div>
          </div>

          <p id="mazeMessage" class="maze-message">도착점(초록)에 도달하세요.</p>
        </aside>

        <!-- 캔버스 -->
        <div class="maze-canvas-wrap">
          <canvas id="mazeCanvas" width="720" height="720"></canvas>
        </div>

      </section>
    </div>

    <!-- ── 시작 오버레이 ── -->
    <div id="mazeStartOverlay" class="overlay">
      <div class="dialog">
        <h2>Maze Escape</h2>
        <p>난이도를 고르고 시작을 누르면 게임이 시작됩니다.</p>
        <div class="size-options">
          <button class="size-btn difficulty-btn" data-difficulty="easy" type="button">초급</button>
          <button class="size-btn difficulty-btn" data-difficulty="normal" type="button">중급</button>
          <button class="size-btn difficulty-btn" data-difficulty="hard" type="button">고급</button>
        </div>
        <button id="mazeStartControlBtn" class="maze-big-start-btn" type="button">시작</button>
      </div>
    </div>

    <!-- ── 결과 오버레이 ── -->
    <div id="mazeResultOverlay" class="overlay hidden">
      <div class="dialog">
        <h2 id="mazeResultTitle">GAME OVER</h2>
        <p id="mazeResultText">점수를 확인하고 다시 도전하세요.</p>
        <div class="size-options">
          <button id="mazeNextBtn" class="size-btn hidden" type="button">다음 스테이지</button>
          <button id="mazeReplayBtn" class="size-btn" type="button">다시 도전</button>
        </div>
      </div>
    </div>

    <script src="../scripts/maze.js"></script>
  </body>
</html>
